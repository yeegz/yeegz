<svg width="1400" height="430" viewBox="0 0 1400 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fallen Asteri">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070D"/>
      <stop offset="0.38" stop-color="#08111F"/>
      <stop offset="0.72" stop-color="#061A2A"/>
      <stop offset="1" stop-color="#042B3F"/>
    </linearGradient>
    <linearGradient id="panel" x1="20" y1="20" x2="1380" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#0A1424"/>
      <stop offset="1" stop-color="#082B40"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#13B9FD" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#19D3FF"/>
      <stop offset="1" stop-color="#13B9FD"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#54F0B8"/>
      <stop offset="1" stop-color="#13B9FD"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#13B9FD"/>
    </linearGradient>
    <radialGradient id="glowA" cx="72%" cy="18%" r="62%">
      <stop stop-color="#13B9FD" stop-opacity="0.32"/>
      <stop offset="0.48" stop-color="#13B9FD" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#13B9FD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="15%" cy="92%" r="58%">
      <stop stop-color="#54F0B8" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#54F0B8" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#54F0B8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="tinyShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#9FD9FF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.05" fill="#9FD9FF" opacity="0.12"/>
    </pattern>
  </defs>
  
  <rect width="1400" height="430" rx="42" fill="#05070D"/>
  <rect x="32" y="32" width="1336" height="366" rx="40" fill="url(#panel)" stroke="#224861" filter="url(#softShadow)"/>
  <rect x="32" y="32" width="1336" height="366" rx="40" fill="url(#glowA)"/>
  <rect x="32" y="32" width="1336" height="366" rx="40" fill="url(#grid)" opacity="0.28"/>

  <rect x="86" y="82" width="320" height="42" rx="21" fill="#07101D" stroke="#214E6C"/>
  <circle cx="112" cy="103" r="6" fill="#60A5FA"/>
  <text x="130" y="110" fill="#C6D6E8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="900" letter-spacing="2">PUBLIC REPOSITORY</text>

  <text x="86" y="188" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="60" font-weight="900" letter-spacing="-1">Fallen Asteri</text>
  <text x="88" y="235" fill="#60A5FA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="900">2D Godot platformer</text>
  <text x="88" y="282" fill="#B8C7D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27" font-weight="700">Movement, combat, levels, transitions, and game-feel systems.</text>

  <rect x="86" y="320" width="562" height="48" rx="24" fill="#07101D" stroke="#214E6C"/>
  <text x="116" y="351" fill="#D9E8F5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="800">Godot · GDScript · Game Systems</text>

  <rect x="760" y="92" width="500" height="248" rx="34" fill="#07101D" stroke="#214E6C"/>
  <path d="M800 280 C900 130 1030 320 1218 155" stroke="#60A5FA" stroke-opacity="0.78" stroke-width="8" stroke-linecap="round"/>
  <path d="M800 304 C920 200 1040 365 1218 210" stroke="#13B9FD" stroke-opacity="0.30" stroke-width="8" stroke-linecap="round"/>
  <circle cx="800" cy="280" r="11" fill="#F8FAFC"/>
  <circle cx="1015" cy="238" r="11" fill="#F8FAFC"/>
  <circle cx="1218" cy="155" r="11" fill="#F8FAFC"/>
  <text x="800" y="145" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3">WHY IT MATTERS</text>
  <text x="800" y="195" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="900">Shows engineering outside normal app CRUD.</text>
  <text x="800" y="247" fill="#8DA1B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">Tap the card to open the project.</text>

</svg>