<svg width="1400" height="700" viewBox="0 0 1400 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="About Yousof Selim">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070D"/>
      <stop offset="0.38" stop-color="#08111F"/>
      <stop offset="0.72" stop-color="#061A2A"/>
      <stop offset="1" stop-color="#042B3F"/>
    </linearGradient>
    <linearGradient id="panel" x1="20" y1="20" x2="1380" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#0A1424"/>
      <stop offset="1" stop-color="#082B40"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#13B9FD" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#19D3FF"/>
      <stop offset="1" stop-color="#13B9FD"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#54F0B8"/>
      <stop offset="1" stop-color="#13B9FD"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#13B9FD"/>
    </linearGradient>
    <radialGradient id="glowA" cx="72%" cy="18%" r="62%">
      <stop stop-color="#13B9FD" stop-opacity="0.32"/>
      <stop offset="0.48" stop-color="#13B9FD" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#13B9FD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="15%" cy="92%" r="58%">
      <stop stop-color="#54F0B8" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#54F0B8" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#54F0B8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="tinyShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#9FD9FF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.05" fill="#9FD9FF" opacity="0.12"/>
    </pattern>
  </defs>
  
  <rect width="1400" height="700" rx="42" fill="#05070D"/>
  <rect x="32" y="32" width="1336" height="636" rx="40" fill="url(#panel)" stroke="#224861" filter="url(#softShadow)"/>
  <rect x="32" y="32" width="1336" height="636" rx="40" fill="url(#glowA)"/>
  <rect x="32" y="32" width="1336" height="636" rx="40" fill="url(#grid)" opacity="0.4"/>

  <text x="86" y="98" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="4">ABOUT / PRODUCT-MINDED ENGINEERING</text>
  <text x="86" y="160" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="52" font-weight="900" letter-spacing="-1">I don’t just build screens.</text>
  <text x="86" y="210" fill="#B8C7D8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">I build the flow behind them — clean UI, reliable APIs, and mobile experiences that feel finished.</text>

  <rect x="86" y="275" width="392" height="260" rx="30" fill="#07101D" stroke="#214E6C"/>
  <text x="124" y="327" fill="#54F0B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3">01 · MOBILE FIRST</text>
  <text x="124" y="378" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="900">Flutter apps</text>
  <text x="124" y="419" fill="#A9B8CA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="650">Cross-platform builds with smooth UI, responsive layouts, and production-ready logic.</text>

  <rect x="504" y="275" width="392" height="260" rx="30" fill="#07101D" stroke="#214E6C"/>
  <text x="542" y="327" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3">02 · BACKEND LOGIC</text>
  <text x="542" y="378" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="900">APIs + data</text>
  <text x="542" y="419" fill="#A9B8CA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="650">Node.js services, REST APIs, Supabase/Firebase, auth flows, and real-time sync.</text>

  <rect x="922" y="275" width="392" height="260" rx="30" fill="#07101D" stroke="#214E6C"/>
  <text x="960" y="327" fill="#A78BFA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3">03 · PRODUCT TASTE</text>
  <text x="960" y="378" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="900">Polish matters</text>
  <text x="960" y="419" fill="#A9B8CA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="650">Minimal, modern, liquid-glass interfaces that feel intentional instead of template-generated.</text>

  <rect x="86" y="574" width="1228" height="52" rx="26" fill="#07101D" stroke="#1C4763"/>
  <text x="121" y="608" fill="#D9E8F5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="750">Software Engineering @ Sunway × Lancaster · graduating 2027 · Digital Marketing Exec @ Sunway Cybersecurity Club</text>

</svg>