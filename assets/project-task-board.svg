<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Task Board project">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset="0.58" stop-color="#101010"/>
      <stop offset="1" stop-color="#1A0003"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0B"/>
      <stop offset="0.68" stop-color="#101114"/>
      <stop offset="1" stop-color="#190407"/>
    </linearGradient>
    <linearGradient id="redline" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FF2A2A"/>
      <stop offset="0.5" stop-color="#FF4D4D"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="smallShadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <pattern id="grain" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.75" fill="#FFFFFF" opacity="0.055"/>
      <circle cx="13" cy="9" r="0.55" fill="#FF2A2A" opacity="0.05"/>
    </pattern>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="420" fill="#050505"/>
  <rect width="1600" height="420" fill="url(#grain)"/>
  <rect x="54" y="48" width="1492" height="324" rx="36" fill="#0A0A0B" stroke="#2A2A2D" filter="url(#shadow)"/>
  <rect x="54" y="48" width="10" height="324" rx="5" fill="#FF2A2A"/>

  <text x="112" y="126" fill="#FF2A2A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="5">CASE 03</text>
  <text x="112" y="214" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="76" font-weight="950" letter-spacing="-2">Task Board</text>
  <text x="114" y="258" fill="#FF2A2A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="900">ClickUp-style productivity tool</text>

  <text x="690" y="156" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="900">Visual planning for messy task lists.</text>
  <text x="690" y="202" fill="#B8B8BC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="750">Drag-and-drop tasks, tags, priorities.</text>

  <rect x="690" y="250" width="600" height="56" rx="28" fill="#111113" stroke="#343438"/>
  <text x="724" y="286" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">JavaScript · CSS · Drag &amp; Drop</text>

  <rect x="1320" y="116" width="112" height="112" rx="56" fill="#160608" stroke="#4A161A"/>
  <path d="M1355 172 L1395 132 M1395 132 H1366 M1395 132 V161" stroke="#FF2A2A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1376" y="276" fill="#8D8D95" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" text-anchor="middle">tap</text>

</svg>