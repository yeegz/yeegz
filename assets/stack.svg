<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stack map">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.52" stop-color="#09111F"/>
      <stop offset="1" stop-color="#0B1E2D"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1600" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1020"/>
      <stop offset="0.62" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0A2737"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="82%" cy="16%" r="66%">
      <stop stop-color="#22D3EE" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="12%" cy="88%" r="66%">
      <stop stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="0.48" stop-color="#8B5CF6" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#E2E8F0" opacity="0.08"/>
    </pattern>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#E2E8F0" stroke-opacity="0.04"/>
    </pattern>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: -2px; }
      .kicker { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: 4px; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 12 14; animation: dash 8s linear infinite; }
      @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -180; } }
    </style>
  </defs>
  
  <rect width="1600" height="760" rx="44" fill="url(#bg)"/>
  <rect width="1600" height="760" rx="44" fill="url(#grid)"/>
  <rect width="1600" height="760" rx="44" fill="url(#violetGlow)"/>
  <rect x="70" y="70" width="1460" height="620" rx="44" fill="url(#panel)" stroke="#23364D" filter="url(#shadow)"/>

  <text class="kicker" x="130" y="142" fill="#22D3EE" font-size="18">STACK MAP</text>
  <text class="title" x="130" y="224" fill="#F8FAFC" font-size="62">Tools that support product speed.</text>
  <text class="font" x="132" y="276" fill="#B9C8D9" font-size="27" font-weight="780">A practical stack for mobile UI, backend logic, real-time data, and fast iteration.</text>

  <g transform="translate(130 354)">
    <rect width="300" height="104" rx="24" fill="#0B1628" stroke="#2A4058"/>
    <circle cx="38" cy="42" r="10" fill="#22D3EE"/>
    <text class="font" x="66" y="52" fill="#FFFFFF" font-size="29" font-weight="950">Flutter</text>
    <text class="font" x="38" y="82" fill="#AFC0D2" font-size="19" font-weight="800">mobile UI · Dart</text>
  </g>
  <g transform="translate(130 490)">
    <rect width="300" height="104" rx="24" fill="#0B1628" stroke="#2A4058"/>
    <circle cx="38" cy="42" r="10" fill="#34D399"/>
    <text class="font" x="66" y="52" fill="#FFFFFF" font-size="29" font-weight="950">Supabase</text>
    <text class="font" x="38" y="82" fill="#AFC0D2" font-size="19" font-weight="800">realtime · data</text>
  </g>

  <g transform="translate(650 424)">
    <circle r="154" stroke="#31445B" stroke-width="2" stroke-dasharray="9 13"/>
    <circle r="96" stroke="#263A52" stroke-width="2" stroke-dasharray="7 11"/>
    <rect x="-172" y="-64" width="344" height="128" rx="32" fill="#0B1628" stroke="#2A4058"/>
    <text class="font" x="0" y="-14" fill="#22D3EE" font-size="20" font-weight="950" text-anchor="middle">CORE</text>
    <text class="font" x="0" y="34" fill="#FFFFFF" font-size="34" font-weight="950" text-anchor="middle">ship clean products</text>
    <circle class="pulse" cx="0" cy="-154" r="11" fill="#22D3EE"/>
    <circle class="pulse" cx="146" cy="50" r="11" fill="#A78BFA"/>
    <circle class="pulse" cx="-146" cy="50" r="11" fill="#34D399"/>
  </g>

  <g transform="translate(1170 354)">
    <rect width="300" height="104" rx="24" fill="#0B1628" stroke="#2A4058"/>
    <circle cx="38" cy="42" r="10" fill="#34D399"/>
    <text class="font" x="66" y="52" fill="#FFFFFF" font-size="29" font-weight="950">Node.js</text>
    <text class="font" x="38" y="82" fill="#AFC0D2" font-size="19" font-weight="800">services · REST APIs</text>
  </g>
  <g transform="translate(1170 490)">
    <rect width="300" height="104" rx="24" fill="#0B1628" stroke="#2A4058"/>
    <circle cx="38" cy="42" r="10" fill="#FFB86B"/>
    <text class="font" x="66" y="52" fill="#FFFFFF" font-size="29" font-weight="950">Firebase</text>
    <text class="font" x="38" y="82" fill="#AFC0D2" font-size="19" font-weight="800">Firestore · sync</text>
  </g>

  <rect x="130" y="628" width="520" height="44" rx="22" fill="#07101D" stroke="#2A4058"/>
  <text class="font" x="160" y="657" fill="#FFFFFF" font-size="20" font-weight="900">TypeScript · JavaScript · Python · PostgreSQL</text>
  <rect x="950" y="628" width="520" height="44" rx="22" fill="#07101D" stroke="#2A4058"/>
  <text class="font" x="980" y="657" fill="#FFFFFF" font-size="20" font-weight="900">Figma · Git · Xcode · Cursor · Claude</text>

</svg>