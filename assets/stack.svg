<svg width="1600" height="860" viewBox="0 0 1600 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated stack map">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1600" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.42" stop-color="#07111F"/>
      <stop offset="0.78" stop-color="#0A1630"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1600" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF" stop-opacity="0.46"/>
      <stop offset="0.44" stop-color="#7C3AED" stop-opacity="0.34"/>
      <stop offset="0.75" stop-color="#00FFA3" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#FFB86B" stop-opacity="0.18"/>
      <animate attributeName="x1" values="0;160;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1600;1420;1600" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.45" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#00FFA3"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="78%" cy="18%" r="70%">
      <stop stop-color="#00E5FF" stop-opacity="0.35"/>
      <stop offset="0.45" stop-color="#00E5FF" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="18%" cy="82%" r="65%">
      <stop stop-color="#7C3AED" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#7C3AED" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <filter id="soft" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#00E5FF" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#E2E8F0" opacity="0.09"/>
    </pattern>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#E2E8F0" stroke-opacity="0.045"/>
    </pattern>
    <clipPath id="clip"><rect x="0" y="0" width="1600" height="860" rx="42"/></clipPath>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: -2px; }
      .ui { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .tiny { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 900; letter-spacing: 4px; }
      @keyframes floaty { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
      @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -260; } }
      .float { animation: floaty 5.5s ease-in-out infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .flow { stroke-dasharray: 14 18; animation: dash 9s linear infinite; }
    </style>
  </defs>
  
  <g clip-path="url(#clip)">
    <rect width="1600" height="860" fill="url(#page)"/>
    <rect width="1600" height="860" fill="url(#grid)"/>
    <rect width="1600" height="860" fill="url(#glowViolet)"/>
    <rect x="70" y="70" width="1460" height="720" rx="44" fill="#08111F" fill-opacity="0.88" stroke="#243B53" filter="url(#shadow)"/>

    <text class="tiny" x="130" y="142" fill="#00E5FF" font-size="18">STACK MAP</text>
    <text class="title" x="130" y="226" fill="#F8FAFC" font-size="62">Tools that support product speed.</text>
    <text class="ui" x="132" y="276" fill="#B9C8D9" font-size="28" font-weight="760">A practical stack for mobile UI, backend logic, real-time data, and fast iteration.</text>

    <g transform="translate(800 520)">
      <circle r="230" stroke="#334155" stroke-width="2" stroke-dasharray="8 14" opacity="0.8"/>
      <circle r="158" stroke="#263E58" stroke-width="2" stroke-dasharray="6 12" opacity="0.8"/>
      <g>
        <animateTransform attributeName="transform" attributeType="XML" type="rotate" from="0" to="360" dur="38s" repeatCount="indefinite"/>
        <circle cx="0" cy="-230" r="12" fill="#00E5FF"/>
        <circle cx="218" cy="-72" r="12" fill="#00FFA3"/>
        <circle cx="134" cy="186" r="12" fill="#B794F4"/>
        <circle cx="-134" cy="186" r="12" fill="#FFB86B"/>
        <circle cx="-218" cy="-72" r="12" fill="#00E5FF"/>
      </g>
      <rect x="-210" y="-74" width="420" height="148" rx="38" fill="#0B1628" stroke="#304E68" filter="url(#soft)"/>
      <text class="ui" x="0" y="-18" fill="#00E5FF" font-size="22" font-weight="950" text-anchor="middle">CORE</text>
      <text class="ui" x="0" y="34" fill="#FFFFFF" font-size="42" font-weight="950" text-anchor="middle">ship clean products</text>
    </g>

    <g transform="translate(130 370)">
      <rect width="310" height="116" rx="26" fill="#0B1628" stroke="#263E58"/>
      <circle cx="40" cy="46" r="10" fill="#00E5FF"/>
      <text class="ui" x="68" y="57" fill="#FFFFFF" font-size="30" font-weight="950">Flutter</text>
      <text class="ui" x="40" y="88" fill="#9FB1C5" font-size="20" font-weight="800">mobile UI · Dart</text>
    </g>
    <g transform="translate(1160 370)">
      <rect width="310" height="116" rx="26" fill="#0B1628" stroke="#263E58"/>
      <circle cx="40" cy="46" r="10" fill="#00FFA3"/>
      <text class="ui" x="68" y="57" fill="#FFFFFF" font-size="30" font-weight="950">Node.js</text>
      <text class="ui" x="40" y="88" fill="#9FB1C5" font-size="20" font-weight="800">services · REST APIs</text>
    </g>
    <g transform="translate(130 534)">
      <rect width="310" height="116" rx="26" fill="#0B1628" stroke="#263E58"/>
      <circle cx="40" cy="46" r="10" fill="#00FFA3"/>
      <text class="ui" x="68" y="57" fill="#FFFFFF" font-size="30" font-weight="950">Supabase</text>
      <text class="ui" x="40" y="88" fill="#9FB1C5" font-size="20" font-weight="800">realtime · data</text>
    </g>
    <g transform="translate(1160 534)">
      <rect width="310" height="116" rx="26" fill="#0B1628" stroke="#263E58"/>
      <circle cx="40" cy="46" r="10" fill="#FFB86B"/>
      <text class="ui" x="68" y="57" fill="#FFFFFF" font-size="30" font-weight="950">Firebase</text>
      <text class="ui" x="40" y="88" fill="#9FB1C5" font-size="20" font-weight="800">Firestore · sync</text>
    </g>
    <g transform="translate(130 698)">
      <rect width="454" height="52" rx="26" fill="#07101D" stroke="#304E68"/>
      <text class="ui" x="30" y="34" fill="#F8FAFC" font-size="21" font-weight="900">TypeScript · JavaScript · Python · PostgreSQL</text>
    </g>
    <g transform="translate(1016 698)">
      <rect width="454" height="52" rx="26" fill="#07101D" stroke="#304E68"/>
      <text class="ui" x="30" y="34" fill="#F8FAFC" font-size="21" font-weight="900">Figma · Git · Xcode · Cursor · Claude</text>
    </g>
  </g>

</svg>