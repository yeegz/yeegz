<svg width="1600" height="430" viewBox="0 0 1600 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Portfolio">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.52" stop-color="#09111F"/>
      <stop offset="1" stop-color="#0B1E2D"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1600" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1020"/>
      <stop offset="0.62" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0A2737"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="82%" cy="16%" r="66%">
      <stop stop-color="#22D3EE" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="12%" cy="88%" r="66%">
      <stop stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="0.48" stop-color="#8B5CF6" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#E2E8F0" opacity="0.08"/>
    </pattern>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#E2E8F0" stroke-opacity="0.04"/>
    </pattern>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: -2px; }
      .kicker { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: 4px; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 12 14; animation: dash 8s linear infinite; }
      @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -180; } }
    </style>
  </defs>
  
  <rect width="1600" height="430" rx="44" fill="url(#bg)"/>
  <rect width="1600" height="430" rx="44" fill="url(#dots)"/>
  <rect width="1600" height="430" rx="44" fill="url(#cyanGlow)"/>
  <rect x="70" y="58" width="1460" height="314" rx="42" fill="url(#panel)" stroke="#23364D" filter="url(#shadow)"/>

  <text class="kicker" x="130" y="130" fill="#A78BFA" font-size="18">CASE 02</text>
  <text class="title" x="130" y="212" fill="#F8FAFC" font-size="64">Portfolio</text>
  <text class="font" x="132" y="258" fill="#A78BFA" font-size="25" font-weight="950">Personal brand website</text>

  <text class="font" x="700" y="162" fill="#F8FAFC" font-size="32" font-weight="950">A portfolio that behaves like a product.</text>
  <text class="font" x="700" y="210" fill="#B9C8D9" font-size="25" font-weight="760">Liquid-glass visuals built for first impressions.</text>

  <rect x="700" y="258" width="610" height="50" rx="25" fill="#07101D" stroke="#2A4058"/>
  <text class="font" x="730" y="291" fill="#FFFFFF" font-size="20" font-weight="900">HTML · CSS · JavaScript · GitHub Pages</text>

  <rect x="1374" y="132" width="70" height="70" rx="22" fill="#07101D" stroke="#2A4058"/>
  <path d="M1398 167 L1422 143 M1422 143 H1404 M1422 143 V161" stroke="#A78BFA" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <path class="dash" d="M704 334 C860 288 1002 376 1208 314" stroke="#A78BFA" stroke-width="4" opacity="0.45"/>

</svg>