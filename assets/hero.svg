<svg width="1600" height="720" viewBox="0 0 1600 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yousof Selim hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.52" stop-color="#09111F"/>
      <stop offset="1" stop-color="#0B1E2D"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1600" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1020"/>
      <stop offset="0.62" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0A2737"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="82%" cy="16%" r="66%">
      <stop stop-color="#22D3EE" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="12%" cy="88%" r="66%">
      <stop stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="0.48" stop-color="#8B5CF6" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#E2E8F0" opacity="0.08"/>
    </pattern>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#E2E8F0" stroke-opacity="0.04"/>
    </pattern>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: -2px; }
      .kicker { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: 4px; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 12 14; animation: dash 8s linear infinite; }
      @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -180; } }
    </style>
  </defs>
  
  <rect width="1600" height="720" rx="44" fill="url(#bg)"/>
  <rect width="1600" height="720" rx="44" fill="url(#grid)"/>
  <rect width="1600" height="720" rx="44" fill="url(#dots)"/>
  <rect width="1600" height="720" rx="44" fill="url(#cyanGlow)"/>
  <rect width="1600" height="720" rx="44" fill="url(#violetGlow)"/>

  <rect x="70" y="70" width="1460" height="580" rx="44" fill="url(#panel)" stroke="#23364D" filter="url(#shadow)"/>
  <rect x="70" y="70" width="1460" height="580" rx="44" fill="url(#cyanGlow)" opacity="0.5"/>

  <text class="kicker" x="130" y="148" fill="#22D3EE" font-size="18">YEEGZ / PRODUCT-MINDED DEVELOPER</text>
  <text class="title" x="130" y="244" fill="#F8FAFC" font-size="88">Yousof Selim</text>
  <text class="font" x="134" y="302" fill="#D8E4F2" font-size="34" font-weight="850">Full-stack &amp; cross-platform mobile developer</text>
  <text class="font" x="134" y="350" fill="#91A4B7" font-size="25" font-weight="700">Flutter · Dart · Node.js · Supabase · Firebase · REST APIs</text>
  <text class="font" x="134" y="414" fill="#C7D5E5" font-size="30" font-weight="800">I turn app ideas into polished products that actually ship.</text>

  <rect x="134" y="470" width="472" height="62" rx="31" fill="#07101D" stroke="#2A4058"/>
  <circle class="pulse" cx="168" cy="501" r="9" fill="#34D399"/>
  <text class="font" x="194" y="510" fill="#FFFFFF" font-size="23" font-weight="950">Open to SWE / Technical PM internships</text>

  <rect x="134" y="558" width="246" height="60" rx="22" fill="#0B1628" stroke="#2A4058"/>
  <text class="font" x="160" y="584" fill="#22D3EE" font-size="16" font-weight="950">SHIPPING SINCE</text>
  <text class="font" x="160" y="612" fill="#FFFFFF" font-size="29" font-weight="950">2023</text>
  <rect x="404" y="558" width="350" height="60" rx="22" fill="#0B1628" stroke="#2A4058"/>
  <text class="font" x="430" y="584" fill="#A78BFA" font-size="16" font-weight="950">EDUCATION</text>
  <text class="font" x="430" y="612" fill="#FFFFFF" font-size="28" font-weight="950">Sunway × Lancaster</text>

  <g transform="translate(1032 142)">
    <rect width="330" height="438" rx="42" fill="#050816" stroke="#3A5068" stroke-width="3"/>
    <rect x="24" y="28" width="282" height="382" rx="32" fill="#0B1220"/>
    <rect x="58" y="58" width="214" height="18" rx="9" fill="#18253A"/>
    <rect x="58" y="112" width="214" height="82" rx="24" fill="#111D30" stroke="#283D55"/>
    <rect x="82" y="138" width="92" height="14" rx="7" fill="#22D3EE"/>
    <rect x="82" y="166" width="158" height="11" rx="6" fill="#506176"/>
    <rect x="58" y="224" width="94" height="112" rx="24" fill="#111D30" stroke="#283D55"/>
    <rect x="178" y="224" width="94" height="112" rx="24" fill="#111D30" stroke="#283D55"/>
    <circle cx="105" cy="280" r="27" fill="#8B5CF6"/>
    <circle cx="225" cy="280" r="27" fill="#34D399"/>
    <rect x="58" y="358" width="214" height="48" rx="18" fill="#0E3A4D" stroke="#22D3EE"/>
    <text class="font" x="90" y="389" fill="#FFFFFF" font-size="20" font-weight="950">build → ship</text>
  </g>

  <path class="dash" d="M930 170 C1030 90 1220 92 1420 210" stroke="#22D3EE" stroke-width="3" opacity="0.35"/>
  <path class="dash" d="M940 570 C1060 490 1228 650 1432 520" stroke="#34D399" stroke-width="3" opacity="0.28"/>
  <rect x="638" y="646" width="324" height="6" rx="3" fill="url(#accent)"/>

</svg>