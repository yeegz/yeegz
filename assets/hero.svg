<svg width="1600" height="650" viewBox="0 0 1600 650" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yousof Selim hero">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="1600" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset="0.58" stop-color="#101010"/>
      <stop offset="1" stop-color="#1A0003"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1600" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0B"/>
      <stop offset="0.68" stop-color="#101114"/>
      <stop offset="1" stop-color="#190407"/>
    </linearGradient>
    <linearGradient id="redline" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#FF2A2A"/>
      <stop offset="0.5" stop-color="#FF4D4D"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.48"/>
    </filter>
    <filter id="smallShadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <pattern id="grain" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.75" fill="#FFFFFF" opacity="0.055"/>
      <circle cx="13" cy="9" r="0.55" fill="#FF2A2A" opacity="0.05"/>
    </pattern>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="650" rx="0" fill="#050505"/>
  <rect width="1600" height="650" fill="url(#fade)"/>
  <rect width="1600" height="650" fill="url(#grid)" opacity="0.9"/>
  <rect width="1600" height="650" fill="url(#grain)"/>

  <rect x="72" y="70" width="1456" height="510" rx="34" fill="#0B0B0C" stroke="#2A2A2D" filter="url(#shadow)"/>
  <rect x="72" y="70" width="1456" height="510" rx="34" fill="url(#panel)"/>

  <rect x="72" y="70" width="16" height="510" rx="8" fill="#FF2A2A"/>
  <rect x="128" y="124" width="240" height="42" rx="21" fill="#160608" stroke="#4A161A"/>
  <circle cx="155" cy="145" r="7" fill="#FF2A2A"/>
  <text x="176" y="153" fill="#F7F7F7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3">YEEGZ / PROFILE</text>

  <text x="128" y="260" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="96" font-weight="950" letter-spacing="-3">Yousof Selim</text>
  <rect x="132" y="286" width="612" height="6" rx="3" fill="url(#redline)"/>

  <text x="128" y="354" fill="#F2F2F2" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="850">Full-stack mobile developer</text>
  <text x="128" y="398" fill="#B8B8BC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="650">Flutter · Node.js · Supabase · Firebase · REST APIs</text>
  <text x="128" y="440" fill="#8D8D95" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="650">Building apps that feel less like templates and more like products.</text>

  <rect x="128" y="486" width="440" height="56" rx="28" fill="#111113" stroke="#36363A"/>
  <circle cx="160" cy="514" r="8" fill="#FF2A2A"/>
  <text x="184" y="523" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="900">Open to SWE / Technical PM internships</text>

  <g transform="translate(980 126)">
    <rect width="410" height="356" rx="30" fill="#070707" stroke="#343438"/>
    <text x="42" y="70" fill="#FF2A2A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="4">CURRENT SIGNAL</text>
    <text x="42" y="150" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="950">Shipping</text>
    <text x="42" y="214" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="950">since 2023</text>
    <text x="42" y="268" fill="#B8B8BC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Freelance builds.</text>
    <text x="42" y="302" fill="#B8B8BC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Real deadlines.</text>
  </g>

  <text x="1496" y="540" fill="#2D2D31" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="160" font-weight="950" text-anchor="end">01</text>

