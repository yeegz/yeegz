<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="CTA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.52" stop-color="#09111F"/>
      <stop offset="1" stop-color="#0B1E2D"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1020"/>
      <stop offset="0.62" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0A2737"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="82%" cy="16%" r="66%">
      <stop stop-color="#22D3EE" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="12%" cy="88%" r="66%">
      <stop stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="0.48" stop-color="#8B5CF6" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#E2E8F0" opacity="0.08"/>
    </pattern>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#E2E8F0" stroke-opacity="0.04"/>
    </pattern>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: -2px; }
      .kicker { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: 4px; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 12 14; animation: dash 8s linear infinite; }
      @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -180; } }
    </style>
  </defs>
  
  <rect width="1600" height="420" rx="44" fill="url(#bg)"/>
  <rect width="1600" height="420" rx="44" fill="url(#dots)"/>
  <rect width="1600" height="420" rx="44" fill="url(#cyanGlow)"/>
  <rect x="70" y="70" width="1460" height="280" rx="44" fill="url(#panel)" stroke="#23364D" filter="url(#shadow)"/>
  <text class="kicker" x="800" y="142" fill="#22D3EE" font-size="18" text-anchor="middle">NEXT CHAPTER</text>
  <text class="title" x="800" y="224" fill="#F8FAFC" font-size="58" text-anchor="middle">Let’s build something people remember.</text>
  <text class="font" x="800" y="278" fill="#B9C8D9" font-size="27" font-weight="800" text-anchor="middle">Open to Software Engineering and Technical PM internships.</text>
  <path class="dash" d="M520 320 C650 282 742 360 890 316 C1000 284 1088 296 1180 258" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>

</svg>