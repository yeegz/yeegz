<svg width="1400" height="360" viewBox="0 0 1400 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Contact Yousof Selim">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05070D"/>
      <stop offset="0.38" stop-color="#08111F"/>
      <stop offset="0.72" stop-color="#061A2A"/>
      <stop offset="1" stop-color="#042B3F"/>
    </linearGradient>
    <linearGradient id="panel" x1="20" y1="20" x2="1380" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.55" stop-color="#0A1424"/>
      <stop offset="1" stop-color="#082B40"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.13"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.035"/>
      <stop offset="1" stop-color="#13B9FD" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#19D3FF"/>
      <stop offset="1" stop-color="#13B9FD"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#54F0B8"/>
      <stop offset="1" stop-color="#13B9FD"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#13B9FD"/>
    </linearGradient>
    <radialGradient id="glowA" cx="72%" cy="18%" r="62%">
      <stop stop-color="#13B9FD" stop-opacity="0.32"/>
      <stop offset="0.48" stop-color="#13B9FD" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#13B9FD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="15%" cy="92%" r="58%">
      <stop stop-color="#54F0B8" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#54F0B8" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#54F0B8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="tinyShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#9FD9FF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.05" fill="#9FD9FF" opacity="0.12"/>
    </pattern>
  </defs>
  
  <rect width="1400" height="360" rx="42" fill="url(#bg)"/>
  <rect width="1400" height="360" rx="42" fill="url(#grid)"/>
  <rect width="1400" height="360" rx="42" fill="url(#glowA)"/>
  <rect x="60" y="58" width="1280" height="244" rx="42" fill="url(#panel)" stroke="#224861" filter="url(#softShadow)"/>
  <rect x="60" y="58" width="1280" height="244" rx="42" fill="url(#glass)"/>
  <text x="700" y="137" text-anchor="middle" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="5">NEXT CHAPTER</text>
  <text x="700" y="198" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="48" font-weight="900">Let’s build something that feels finished.</text>
  <text x="700" y="244" text-anchor="middle" fill="#A9B8CA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Open to Software Engineering and Technical PM internships.</text>

</svg>