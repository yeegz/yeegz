<svg width="1600" height="640" viewBox="0 0 1600 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Recruiter proof">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1600" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.42" stop-color="#07111F"/>
      <stop offset="0.78" stop-color="#0A1630"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1600" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF" stop-opacity="0.46"/>
      <stop offset="0.44" stop-color="#7C3AED" stop-opacity="0.34"/>
      <stop offset="0.75" stop-color="#00FFA3" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#FFB86B" stop-opacity="0.18"/>
      <animate attributeName="x1" values="0;160;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1600;1420;1600" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.45" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#00FFA3"/>
    </linearGradient>
    <radialGradient id="glowCyan" cx="78%" cy="18%" r="70%">
      <stop stop-color="#00E5FF" stop-opacity="0.35"/>
      <stop offset="0.45" stop-color="#00E5FF" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet" cx="18%" cy="82%" r="65%">
      <stop stop-color="#7C3AED" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#7C3AED" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
    <filter id="soft" x="-20%" y="-25%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#00E5FF" flood-opacity="0.12"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#E2E8F0" opacity="0.09"/>
    </pattern>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#E2E8F0" stroke-opacity="0.045"/>
    </pattern>
    <clipPath id="clip"><rect x="0" y="0" width="1600" height="640" rx="42"/></clipPath>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: -2px; }
      .ui { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .tiny { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 900; letter-spacing: 4px; }
      @keyframes floaty { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
      @keyframes pulse { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -260; } }
      .float { animation: floaty 5.5s ease-in-out infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .flow { stroke-dasharray: 14 18; animation: dash 9s linear infinite; }
    </style>
  </defs>
  
  <g clip-path="url(#clip)">
    <rect width="1600" height="640" fill="url(#page)"/>
    <rect width="1600" height="640" fill="url(#grid)"/>
    <rect width="1600" height="640" fill="url(#glowViolet)"/>
    <rect x="70" y="70" width="1460" height="500" rx="44" fill="#08111F" fill-opacity="0.92" stroke="#243B53" filter="url(#shadow)"/>
    <text class="tiny" x="130" y="142" fill="#00E5FF" font-size="18">WHY RECRUITERS SHOULD CARE</text>
    <text class="title" x="130" y="226" fill="#F8FAFC" font-size="62">I can own the path from idea to shipped app.</text>

    <g transform="translate(130 302)">
      <rect width="390" height="152" rx="30" fill="#0B1628" stroke="#263E58"/>
      <text class="ui" x="34" y="58" fill="#00E5FF" font-size="22" font-weight="950">01 · PRODUCT SENSE</text>
      <text class="ui" x="34" y="104" fill="#FFFFFF" font-size="30" font-weight="950">Design-aware engineer</text>
    </g>
    <g transform="translate(560 302)">
      <rect width="390" height="152" rx="30" fill="#0B1628" stroke="#263E58"/>
      <text class="ui" x="34" y="58" fill="#00FFA3" font-size="22" font-weight="950">02 · EXECUTION</text>
      <text class="ui" x="34" y="104" fill="#FFFFFF" font-size="30" font-weight="950">Frontend + backend</text>
    </g>
    <g transform="translate(990 302)">
      <rect width="390" height="152" rx="30" fill="#0B1628" stroke="#263E58"/>
      <text class="ui" x="34" y="58" fill="#B794F4" font-size="22" font-weight="950">03 · SPEED</text>
      <text class="ui" x="34" y="104" fill="#FFFFFF" font-size="30" font-weight="950">AI-assisted workflow</text>
    </g>

    <rect x="130" y="492" width="1250" height="42" rx="21" fill="#07101D" stroke="#304E68"/>
    <rect x="130" y="492" width="760" height="42" rx="21" fill="url(#line)" opacity="0.92">
      <animate attributeName="width" values="560;940;760;560" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text class="ui" x="154" y="520" fill="#FFFFFF" font-size="19" font-weight="950">ready for internships · mobile engineering · product-minded teams</text>
  </g>

</svg>