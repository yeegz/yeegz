<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Recruiter proof">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="0.52" stop-color="#09111F"/>
      <stop offset="1" stop-color="#0B1E2D"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1600" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1020"/>
      <stop offset="0.62" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0A2737"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.48" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="82%" cy="16%" r="66%">
      <stop stop-color="#22D3EE" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#22D3EE" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violetGlow" cx="12%" cy="88%" r="66%">
      <stop stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="0.48" stop-color="#8B5CF6" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#E2E8F0" opacity="0.08"/>
    </pattern>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#E2E8F0" stroke-opacity="0.04"/>
    </pattern>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: -2px; }
      .kicker { font-family: Inter, Segoe UI, Arial, sans-serif; font-weight: 950; letter-spacing: 4px; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .dash { stroke-dasharray: 12 14; animation: dash 8s linear infinite; }
      @keyframes pulse { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -180; } }
    </style>
  </defs>
  
  <rect width="1600" height="560" rx="44" fill="url(#bg)"/>
  <rect width="1600" height="560" rx="44" fill="url(#grid)"/>
  <rect width="1600" height="560" rx="44" fill="url(#violetGlow)"/>
  <rect x="70" y="70" width="1460" height="420" rx="44" fill="url(#panel)" stroke="#23364D" filter="url(#shadow)"/>

  <text class="kicker" x="130" y="142" fill="#22D3EE" font-size="18">WHY RECRUITERS SHOULD CARE</text>
  <text class="title" x="130" y="224" fill="#F8FAFC" font-size="58">I can own the path from idea to shipped app.</text>

  <g transform="translate(130 294)">
    <rect width="390" height="124" rx="28" fill="#0B1628" stroke="#2A4058"/>
    <text class="font" x="32" y="52" fill="#22D3EE" font-size="20" font-weight="950">PRODUCT SENSE</text>
    <text class="font" x="32" y="92" fill="#FFFFFF" font-size="28" font-weight="950">Design-aware engineer</text>
  </g>
  <g transform="translate(562 294)">
    <rect width="390" height="124" rx="28" fill="#0B1628" stroke="#2A4058"/>
    <text class="font" x="32" y="52" fill="#34D399" font-size="20" font-weight="950">EXECUTION</text>
    <text class="font" x="32" y="92" fill="#FFFFFF" font-size="28" font-weight="950">Frontend + backend</text>
  </g>
  <g transform="translate(994 294)">
    <rect width="390" height="124" rx="28" fill="#0B1628" stroke="#2A4058"/>
    <text class="font" x="32" y="52" fill="#A78BFA" font-size="20" font-weight="950">SPEED</text>
    <text class="font" x="32" y="92" fill="#FFFFFF" font-size="28" font-weight="950">AI-assisted workflow</text>
  </g>

  <rect x="130" y="452" width="1250" height="8" rx="4" fill="#07101D"/>
  <rect x="130" y="452" width="820" height="8" rx="4" fill="url(#accent)">
    <animate attributeName="width" values="620;940;820;620" dur="5s" repeatCount="indefinite"/>
  </rect>

</svg>