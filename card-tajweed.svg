<svg width="400" height="150" viewBox="0 0 400 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tajweed — UI/UX redesign of a Quranic-recitation learning platform">
  <defs>
    <clipPath id="tframe"><rect width="400" height="150" rx="24"/></clipPath>
    <linearGradient id="tstroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="ttop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="tglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#02569B" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#02569B" stop-opacity="0"/>
    </radialGradient>
    <filter id="tblur" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <g clip-path="url(#tframe)">
    <rect width="400" height="150" fill="#0D1525"/>
    <circle cx="38" cy="155" r="85" fill="url(#tglow)" filter="url(#tblur)">
      <animate attributeName="opacity" values="0.65;1;0.65" dur="6s" repeatCount="indefinite"/>
    </circle>
    <rect x="0.5" y="0.5" width="399" height="149" rx="23.5" stroke="url(#tstroke)"/>
    <rect x="40" y="0.5" width="320" height="1" fill="url(#ttop)"/>

    <text x="24" y="42" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="17" font-weight="600" fill="#13B9FD">📖 Tajweed</text>
    <text x="24" y="72" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#94A3B8">UI/UX redesign for a Quranic-recitation learning</text>
    <text x="24" y="91" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12.5" fill="#94A3B8">platform — navigation &amp; information architecture.</text>

    <circle cx="29" cy="121" r="5" fill="#F24E1E"/>
    <text x="41" y="125.5" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#94A3B8">Figma</text>
    <circle cx="105" cy="121" r="5" fill="#A78BFA"/>
    <text x="117" y="125.5" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#94A3B8">UI / UX</text>
  </g>
</svg>
