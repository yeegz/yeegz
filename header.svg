<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Yousof Selim — Full-Stack and Cross-Platform Developer">
  <defs>
    <clipPath id="frame"><rect width="1200" height="320" rx="24"/></clipPath>
    <clipPath id="cardClip"><rect x="170" y="62" width="860" height="196" rx="30"/></clipPath>

    <radialGradient id="blobDeep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#02569B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#02569B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobSky" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#13B9FD" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#13B9FD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="glassStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="topHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="soften" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="58"/>
    </filter>

    <pattern id="dotGrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#FFFFFF" fill-opacity="0.045"/>
    </pattern>
  </defs>

  <g clip-path="url(#frame)">
    <!-- canvas -->
    <rect width="1200" height="320" fill="#070B14"/>
    <rect width="1200" height="320" fill="url(#dotGrid)"/>

    <!-- drifting light blobs behind the glass -->
    <circle cx="170" cy="50" r="200" fill="url(#blobDeep)" filter="url(#soften)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 80 45; 0 0" dur="17s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="280" r="220" fill="url(#blobSky)" filter="url(#soften)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -90 -55; 0 0" dur="21s" repeatCount="indefinite"/>
    </circle>
    <circle cx="630" cy="340" r="160" fill="url(#blobTeal)" filter="url(#soften)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 45 -65; 0 0" dur="14s" repeatCount="indefinite"/>
    </circle>

    <!-- frosted glass card -->
    <rect x="170" y="62" width="860" height="196" rx="30" fill="#FFFFFF" fill-opacity="0.045"/>
    <rect x="170.5" y="62.5" width="859" height="195" rx="29.5" stroke="url(#glassStroke)"/>
    <rect x="230" y="62" width="740" height="1.5" fill="url(#topHighlight)"/>

    <!-- glare sweeping across the glass -->
    <g clip-path="url(#cardClip)">
      <g transform="skewX(-18)">
        <rect x="0" y="30" width="130" height="260" fill="url(#sheen)">
          <animateTransform attributeName="transform" type="translate" values="-160 0; -160 0; 1480 0" keyTimes="0; 0.55; 1" dur="9s" repeatCount="indefinite"/>
        </rect>
      </g>
    </g>

    <!-- type -->
    <text x="600" y="146" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="46" font-weight="600" letter-spacing="0.5" fill="#F1F5F9">Yousof Selim<tspan fill="#13B9FD" font-weight="500">▍<animate attributeName="fill-opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/></tspan></text>

    <text x="600" y="183" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13.5" font-weight="600" letter-spacing="5" fill="#13B9FD">FULL-STACK &amp; CROSS-PLATFORM DEVELOPER</text>

    <text x="600" y="210" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" letter-spacing="0.5" fill="#94A3B8">Flutter · Dart · Node.js · Supabase — shipping real products since 2023</text>

    <text x="600" y="238" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12.5" letter-spacing="1.5" fill="#CBD5E1"><tspan fill="#34D399">●<animate attributeName="fill-opacity" values="1;0.35;1" dur="2.4s" repeatCount="indefinite"/></tspan>  open to SWE / technical PM internships</text>
  </g>
</svg>
