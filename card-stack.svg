<svg width="1100" height="560" viewBox="0 0 1100 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tech stack card">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1100" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1525"/>
      <stop offset="0.55" stop-color="#0A1322"/>
      <stop offset="1" stop-color="#063A56"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1100" height="560" rx="34" fill="#070B14"/>
  <rect x="22" y="22" width="1056" height="516" rx="30" fill="url(#card)" stroke="#1E3A52" filter="url(#shadow)"/>
  <text x="72" y="76" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="4">STACK</text>
  <text x="72" y="118" fill="#F1F5F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="850">Tools I use to ship</text>
  <text x="72" y="152" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="500">A practical stack for full-stack mobile apps, dashboards, APIs, and polished product interfaces.</text>

  <rect x="72" y="195" width="465" height="138" rx="26" fill="#0B1220" stroke="#1D3A54"/>
  <text x="105" y="238" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Mobile & Frontend</text>
  <text x="105" y="278" fill="#F1F5F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="750">Flutter · Dart · React Native</text>
  <text x="105" y="310" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="600">Tailwind CSS · responsive UI · app polish</text>

  <rect x="563" y="195" width="465" height="138" rx="26" fill="#0B1220" stroke="#1D3A54"/>
  <text x="596" y="238" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Backend & Data</text>
  <text x="596" y="278" fill="#F1F5F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="750">Node.js · REST APIs · Supabase</text>
  <text x="596" y="310" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="600">PostgreSQL · Firebase · real-time sync</text>

  <rect x="72" y="358" width="465" height="118" rx="26" fill="#0B1220" stroke="#1D3A54"/>
  <text x="105" y="401" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Languages</text>
  <text x="105" y="441" fill="#F1F5F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="750">TypeScript · JavaScript · Python</text>

  <rect x="563" y="358" width="465" height="118" rx="26" fill="#0B1220" stroke="#1D3A54"/>
  <text x="596" y="401" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="850">Workflow</text>
  <text x="596" y="441" fill="#F1F5F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="750">Figma · Git · Xcode · Cursor · Claude</text>
</svg>
