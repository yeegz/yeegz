<svg width="1100" height="430" viewBox="0 0 1100 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Profile summary card">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1100" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1525"/>
      <stop offset="0.62" stop-color="#0A1322"/>
      <stop offset="1" stop-color="#063A56"/>
    </linearGradient>
    <linearGradient id="line" x1="50" y1="0" x2="1050" y2="0">
      <stop stop-color="#13B9FD" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#13B9FD"/>
      <stop offset="1" stop-color="#13B9FD" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1100" height="430" rx="34" fill="#070B14"/>
  <rect x="22" y="22" width="1056" height="386" rx="30" fill="url(#card)" stroke="#1E3A52" filter="url(#shadow)"/>
  <rect x="72" y="80" width="956" height="1.5" fill="url(#line)"/>
  <text x="72" y="60" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="4">ABOUT</text>
  <text x="72" y="126" fill="#F1F5F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" font-weight="850">What I build</text>
  <text x="72" y="166" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="500">I build cross-platform products that feel polished, practical, and ready to ship.</text>

  <rect x="72" y="205" width="300" height="118" rx="24" fill="#0B1220" stroke="#1D3A54"/>
  <text x="102" y="247" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="800">ROLE</text>
  <text x="102" y="284" fill="#F1F5F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Full-Stack + Mobile</text>

  <rect x="400" y="205" width="300" height="118" rx="24" fill="#0B1220" stroke="#1D3A54"/>
  <text x="430" y="247" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="800">EDUCATION</text>
  <text x="430" y="284" fill="#F1F5F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Sunway × Lancaster</text>
  <text x="430" y="312" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Software Engineering · 2027</text>

  <rect x="728" y="205" width="300" height="118" rx="24" fill="#0B1220" stroke="#1D3A54"/>
  <text x="758" y="247" fill="#13B9FD" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="800">SHIPPING SINCE</text>
  <text x="758" y="284" fill="#F1F5F9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">February 2023</text>
  <text x="758" y="312" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Freelance · real clients</text>

  <text x="72" y="368" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="600">Driven by clean UI, reliable backend plumbing, and the difference between “it works” and “it feels right”.</text>
</svg>
